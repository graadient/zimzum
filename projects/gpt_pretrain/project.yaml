project_name: gpt_pretrain

# Commands
train_cmd: "uv run -m projects.gpt_pretrain.train"

# Artifacts
checkpoint: checkpoint.pt
config: checkpoint_config.json
metrics: metrics.json

# Metric
primary_metric: val_bpb
metric_direction: minimize
noise_threshold: 0.001

# Time budget (seconds)
time_budget: 300

# Model loading (judge uses these to reconstruct the model)
model_module: projects.gpt_pretrain.model
model_class: GPT
config_class: GPTConfig

# Evaluation (judge calls this to compute the metric)
eval_module: projects.gpt_pretrain.evaluate
eval_fn: evaluate
eval_batch_size: 128

# Surface check (only these files may be modified by the agent)
mutable_files:
  - projects/gpt_pretrain/train.py

# Extra metrics to store in db (maps display name -> metrics.json key)
extra_metrics:
  depth: depth
  mfu_percent: mfu_percent

# Display columns for db show
display_columns:
  - id
  - outcome
  - val_bpb
  - peak_vram_mb
  - depth
  - num_steps
  - child_commit
  - hypothesis
